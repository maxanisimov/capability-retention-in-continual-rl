standard_4x4:
  env1_map: ["SFFF", "FHFH", "FFFH", "HFFG"]
  env2_map: ["SHFF", "FFFH", "FHFF", "HFFG"]
  is_slippery: false
  max_steps: 100
  noadapt_max_train_timesteps: 500000
  unsafeadapt_max_train_timesteps: 500000 # 200_000 is not enough, can test values between 200,000 and 500,000
  safeadapt_max_train_timesteps: 500000 # 200000 is enough here
  seed: 42
  notes: "Classic 4x4 FrozenLake. Standard hole positions shift between tasks."

bottleneck_4x4:
  env1_map: ["SFFF", "FHFF", "FHFF", "FFFG"]
  env2_map: ["SFFH", "FFHF", "FFFF", "FFFG"]
  is_slippery: false
  max_steps: 100
  noadapt_max_train_timesteps: 500000
  unsafeadapt_max_train_timesteps: 500000
  safeadapt_max_train_timesteps: 500000
  seed: 42
  notes: "Holes create bottleneck passages, testing adaptation in constrained spaces."

diagonal_4x4:
  env1_map: ["SFFF", "FHFF", "FFHF", "FFFG"]
  env2_map: ["SFFH", "FFFF", "FHFF", "FFFG"]
  is_slippery: false
  max_steps: 100
  noadapt_max_train_timesteps: 500000
  unsafeadapt_max_train_timesteps: 500000
  safeadapt_max_train_timesteps: 500000
  seed: 42
  notes: "Diagonal hole pattern. Holes shift perpendicular to natural paths."

standard_8x8:
  env1_map: ["SFFFFFFF", "FFFFFFFF", "FFFHFFFF", "HHHHFFFF", "FFFHFFFF", "FHFFFFFF", "FFFFFFFF", "FFFFFFFG"]
  env2_map: ["SFFFFFFF", "FHFFFFFF", "FFFFFFFF", "FFFFHHHH", "FFFFFFHF", "FFFFFFFF", "FFFFFHFF", "FFFFFFFG"]
  is_slippery: false
  max_steps: 200
  noadapt_max_train_timesteps: 500000
  unsafeadapt_max_train_timesteps: 500000
  safeadapt_max_train_timesteps: 500000
  seed: 42
  notes: "Larger 8x8 grid testing scalability to bigger state spaces."
