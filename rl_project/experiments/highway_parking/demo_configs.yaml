tight_upper:
  env_base:
    observation:
      type: KinematicsGoal
      features: ["x", "y", "vx", "vy", "cos_h", "sin_h"]
      scales: [100, 100, 5, 5, 1, 1]
      normalize: false
    action:
      type: DiscreteMetaAction
    reward_weights: [1, 0.3, 0, 0, 0.02, 0.02]
    success_goal_reward: 0.12
    collision_reward: -5
    steering_range_deg: 45
    simulation_frequency: 15
    policy_frequency: 5
    duration: 100
    screen_width: 600
    screen_height: 300
    centering_position: [0.5, 0.5]
    scaling: 7
    controlled_vehicles: 1
    add_walls: true
  task1:
    goal_spots: [['b', 'c', 1]]
    parked_vehicles_spots: [['a', 'b', 0], ['a', 'b', 1], ['b', 'c', 0], ['b', 'c', 2]]
    vehicles_count: 4
  task2:
    goal_spots: [['a', 'b', 2]]
    parked_vehicles_spots: [['a', 'b', 0], ['a', 'b', 3], ['b', 'c', 0], ['b', 'c', 2]]
    vehicles_count: 4
  noadapt_train_timesteps: 100000
  unsafeadapt_train_timesteps: 100000
  safeadapt_train_timesteps: 50000
  safe_env1_state_action_data_num_rollouts: 100
  num_eval_episodes: 100
  seed: 42
  notes: "Task 1: park in upper lane ('b','c',1) between cars. Task 2: park in lower lane ('a','b',2)."

