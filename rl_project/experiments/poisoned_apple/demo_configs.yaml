simple_5x5:
  grid_size: 5
  max_steps: 9
  observation_type: flat
  agent_start_pos: [0, 0]
  env1_safe_apples: [[1, 1], [2, 2]]
  env1_poisoned_apples: [[3, 3]]
  env2_safe_apples: [[2, 2]]
  env2_poisoned_apples: [[1, 1], [3, 3]]
  unadaptable_actor_timesteps: 1000
  rashomon_timesteps: 5000 # >4000 needed to be safe and performant in Env2
  safe_env1_state_action_data_num_rollouts: 1
  seed: 42
  notes: "Works well, standard actor fails on Env2"

