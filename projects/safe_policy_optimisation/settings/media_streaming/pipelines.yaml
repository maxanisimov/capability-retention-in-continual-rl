pipelines:
  media_streaming_deterministic:
    description: Deterministic CustomMediaStreaming pipeline using the default safe-policy-optimisation template.
    module: projects.safe_policy_optimisation.stages.train_policy_optimisation_pipeline
    default_task: media_streaming_deterministic

    output:
      output_dir: projects/safe_policy_optimisation/outputs/deterministic_media_streaming
      run_id: media_streaming_deterministic

    runtime:
      seed: 0
      device: cpu

    shield_synthesis:
      constraint: PCTL
      constraint_kwargs:
        alpha: 0.01
      init_safety_bound: 1.0e-12
      theta: 1.0e-12
      max_vi_steps: 2000
      granularity: 10
      unsafe_cost_threshold: 0.5

    safety:
      cost_limit: 0.0
      shield_path: projects/safe_policy_optimisation/artifacts/shields/CustomMediaStreaming/media_streaming_deterministic/shield_q.pt

    safe_rl_baselines:
      algorithms:
        - ppo_lagrangian
        - ppo_pid_lagrangian
        - cpo

    training:
      total_timesteps: 2000
      learning_rate: 0.0003
      n_steps: 512
      batch_size: 128
      n_epochs: 4
      gamma: 0.99

    rashomon_set:
      rashomon_dir: projects/safe_policy_optimisation/artifacts/shield_rashomon/media_streaming_deterministic
      rashomon_n_iters: 2000
      rashomon_checkpoint: 100
      rashomon_batch_size: 500
      certificate_samples: 1000

    early_stopping:
      early_stop_eval_freq: 100
      early_stop_eval_episodes: 1
      early_stop_success_rate: 1.0
      success_reward_threshold: -0.5

    evaluation:
      eval_episodes: 1
      shielded_evaluation_policy: unshielded
      rashomon_evaluation_policy: unshielded

    stages:
      skip_baselines: false
      skip_shielded_policy: false
      skip_rashomon_policy: false
