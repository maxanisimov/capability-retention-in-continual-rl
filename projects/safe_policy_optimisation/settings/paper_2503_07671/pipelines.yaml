# Main-paper (arXiv:2503.07671) safe-policy-optimisation pipelines.
#
# The shared body lives once in the `_defaults` anchors below and is merged into
# each pipeline with the YAML merge key (`<<: *anchor`) or a direct alias
# (`*anchor`). Per-experiment differences (shield alpha / cost_limit / shield
# path / total_timesteps / success threshold) are set as small overrides.
_defaults:
  module: &module projects.safe_policy_optimisation.stages.train_policy_optimisation_pipeline
  runtime: &runtime
    seed: 0
    device: cpu
  shield_synthesis: &shield_synthesis
    constraint: PCTL
    constraint_kwargs:
      alpha: 0.01
    init_safety_bound: 0.01
    theta: 1.0e-12
    max_vi_steps: 2000
    granularity: 10
    unsafe_cost_threshold: 0.5
  safety: &safety
    cost_limit: 0.01
  safe_rl_baselines: &safe_rl_baselines
    algorithms:
      - ppo_lagrangian
      - ppo_pid_lagrangian
      - cpo
  training: &training
    total_timesteps: 25000
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    max_grad_norm: 0.5
    ent_coef: 0.0
    vf_coef: 0.5
    cost_gamma: 0.99
    cost_gae_lambda: 0.95
    lagrangian_multiplier_init: 10.0
  rashomon_set: &rashomon_set
    rashomon_n_iters: 2000
    rashomon_checkpoint: 100
    rashomon_batch_size: 500
    certificate_samples: 1000
  early_stopping: &early_stopping
    early_stop_eval_freq: 2048
    early_stop_eval_episodes: 100
    early_stop_success_rate: 1.0
    success_reward_threshold: 0.0
  evaluation: &evaluation
    eval_episodes: 100
    shielded_evaluation_policy: shielded
    rashomon_evaluation_policy: shielded
  monitoring: &monitoring
    curve_eval_freq: 2048
    curve_eval_episodes: 20
  stages: &stages
    skip_baselines: false
    skip_shielded_policy: false
    skip_rashomon_policy: false

pipelines:
  paper_2503_07671_media_streaming:
    description: Main-paper Media Streaming experiment from arXiv:2503.07671.
    module: *module
    default_task: paper_2503_07671_media_streaming
    output:
      output_dir: projects/safe_policy_optimisation/outputs/paper_2503_07671/media_streaming
      run_id: paper_2503_07671_media_streaming
    runtime: *runtime
    shield_synthesis:
      <<: *shield_synthesis
      constraint_kwargs:
        alpha: 0.001
      init_safety_bound: 0.001
    safety:
      <<: *safety
      cost_limit: 0.001
      shield_path: projects/safe_policy_optimisation/artifacts/shields/CustomMediaStreaming/custommediastreamingv2_paper_2503_07671/shield_q.pt
    safe_rl_baselines: *safe_rl_baselines
    training: *training
    rashomon_set:
      <<: *rashomon_set
      rashomon_dir: projects/safe_policy_optimisation/artifacts/shield_rashomon/paper_2503_07671/media_streaming
    early_stopping:
      <<: *early_stopping
      success_reward_threshold: -0.5
    evaluation: *evaluation
    monitoring: *monitoring
    stages: *stages

