# Stochastic pipelines reuse the deterministic source-training hyperparameters
# as a starting point; tune separately as needed for slippery dynamics.
diagonal_4x4_stochastic:
  raw_eval:
    episodes: 1
    mean_reward: 1.0
    std_reward: 0.0
    failure_rate: 0.0
  ppo:
    total_timesteps: 50000
    hidden: 128
    rollout_steps: 1024
    update_epochs: 10
    minibatch_size: 256
    gamma: 0.995
    gae_lambda: 0.97
    clip_coef: 0.2
    ent_coef: 0.005
    vf_coef: 0.5
    lr: 0.0001
    max_grad_norm: 0.5
    device: cpu
    early_stop: true
    early_stop_min_steps: 0
    early_stop_reward_threshold: 1.0
    early_stop_failure_rate_threshold: 0.0
    early_stop_deterministic_total_reward_threshold: 1.0
    early_stop_deterministic_eval_episodes: 1
  training_wrappers:
    coordinate_observation: true
    dense_reward_shaping: true
  activation: relu
  # Stochastic source-policy success is judged by averaged success over episodes
  # (a single greedy rollout can slip into a hole even for an optimal policy).
  # success_rate_threshold is a per-pipeline starting point; tune empirically.
  source_success:
    eval_episodes: 100
    success_rate_threshold: 0.7

