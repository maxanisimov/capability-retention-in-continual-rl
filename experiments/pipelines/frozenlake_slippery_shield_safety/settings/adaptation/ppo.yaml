diagonal_4x4:
  source_task_num: 0.0
  downstream_task_num: 1.0
  warm_start:
    actor: true
    critic: true
  pre_adaptation_transform:
    task_feature_neutralization: false
    task_feature_index: 2
    description: bias := bias - weight[:, task_feature_index] * 1.0; weight[:, task_feature_index]
      := 0.0.
  train_shaped: true
  activation: relu
  success: true
  downstream_eval:
    episodes: 100
    mean_reward: null
    std_reward: null
    failure_rate: 0.2
    success_rate: 0.8
  ppo:
    seed: 0
    total_timesteps: 40000
    eval_episodes: 100
    rollout_steps: 1024
    update_epochs: 10
    minibatch_size: 256
    gamma: 0.995
    gae_lambda: 0.97
    clip_coef: 0.2
    ent_coef: 0.05
    vf_coef: 0.5
    lr: 0.0005
    max_grad_norm: 0.5
    device: cpu
    early_stop: true
    early_stop_deterministic_total_reward_threshold: null
    early_stop_deterministic_eval_episodes: 100
    early_stop_min_steps: 5
    early_stop_reward_threshold: null
    early_stop_failure_rate_threshold: 0.2
    early_stop_success_rate_threshold: 0.8
