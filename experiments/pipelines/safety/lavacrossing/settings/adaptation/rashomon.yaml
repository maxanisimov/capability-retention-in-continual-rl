_defaults: &rashomon_defaults
  rashomon:
    rashomon_n_iters: 50000
    inverse_temp_start: 10
    inverse_temp_max: 1000
    rashomon_checkpoint: 100
    rashomon_surrogate_aggregation: min
    rashomon_min_hard_spec: 1.0
    safety_finetune_lr: 0.01
    safety_finetune_max_epochs: 3000

corridor_7x7_deterministic: *rashomon_defaults
corridor_7x7_slip_0p1: *rashomon_defaults
route_switch_7x7_deterministic: *rashomon_defaults
route_switch_7x7_slip_0p1: *rashomon_defaults
