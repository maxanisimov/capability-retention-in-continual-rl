simple_5x5:
  grid_size: 5
  observation_type: flat
  append_task_id: false
  max_steps: 9
  reward_safe: 1.0
  reward_poison: -1.0
  reward_step: -0.01
  
  task1_agent_start_pos: [0, 0]
  task1_safe_apples: [[1, 1], [2, 2]]
  task1_poisoned_apples: [[3, 3]]
  task1_max_total_reward: 1.96

  task2_agent_start_pos: [0, 0]
  task2_safe_apples: [[2, 2]]
  task2_poisoned_apples: [[1, 1], [3, 3]]
  task2_max_total_reward: 0.96

  source_total_timesteps: 20000
  downstream_total_timesteps: 20000 # >4000 needed to be safe and performant in Env2
  eval_episodes: 1
  notes: "Works well, standard actor fails on Env2"

