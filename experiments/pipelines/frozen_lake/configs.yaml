standard_4x4:
  env1_map:
    - "SFFF"
    - "FHFH"
    - "FFFH"
    - "HFFG"
  env2_map:
    - "SHFF"
    - "FFFH"
    - "FHFF"
    - "HFFG"
  is_slippery: false
  train:
    source_total_timesteps: 500000
    downstream_total_timesteps: 50000
    hidden: 64
    ent_coef: 0.1
    ewc_lambda: 5000.0
    rashomon_n_iters: 5000
    eval_episodes: 1
    device: cpu
    source_mode: safe
  notes: "Classic 4x4 FrozenLake. Standard hole positions shift between tasks."

