default:
  source_task_id: 0.0
  downstream_task_id: 1.0
  warm_start:
    actor: true
    critic: true
  pre_adaptation_transform:
    task_feature_neutralization: false
  downstream_eval:
    episodes_post_training: 100
  ppo:
    total_timesteps: 200000
    eval_episodes_during_training: 20
    rollout_steps: 2048
    update_epochs: 10
    minibatch_size: 256
    gamma: 0.99
    gae_lambda: 0.95
    clip_coef: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    lr: 0.0003
    max_grad_norm: 0.5
    device: cpu
    early_stop: true
    early_stop_min_steps: 0
    early_stop_reward_threshold: 200
    early_stop_failure_rate_threshold: null
    early_stop_deterministic_total_reward_threshold: null
    early_stop_deterministic_eval_episodes: 20

