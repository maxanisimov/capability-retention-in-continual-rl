deterministic__default_to_twitchy_vehicle:
  rashomon:
    rashomon_rollouts: 1
    rashomon_n_iters: 10000
    rashomon_min_hard_spec: 1.0
    rashomon_surrogate_aggregation: min
    inverse_temp_start: 10
    inverse_temp_max: 1000
    rashomon_checkpoint: 100

deterministic__default_to_sluggish_vehicle:
  rashomon:
    rashomon_rollouts: 1
    rashomon_n_iters: 1000 # More iterations so far lead to worse downstream performance 
    rashomon_min_hard_spec: 1.0
    rashomon_surrogate_aggregation: min
    inverse_temp_start: 10
    inverse_temp_max: 1000
    rashomon_checkpoint: 100

deterministic__default_to_underpowered_vehicle:
  rashomon:
    rashomon_rollouts: 1
    rashomon_n_iters: 10000
    rashomon_min_hard_spec: 1.0
    rashomon_surrogate_aggregation: min
    inverse_temp_start: 10
    inverse_temp_max: 1000
    rashomon_checkpoint: 100
