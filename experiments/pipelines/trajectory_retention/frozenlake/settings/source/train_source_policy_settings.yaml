diagonal_10x10:
  raw_eval:
    episodes: 1
    mean_reward: 1.0
    std_reward: 0.0
    failure_rate: 0.0
  ppo:
    total_timesteps: 50000
    hidden: 128
    rollout_steps: 1024
    update_epochs: 10
    minibatch_size: 256
    gamma: 0.995
    gae_lambda: 0.97
    clip_coef: 0.2
    ent_coef: 0.005
    vf_coef: 0.5
    lr: 0.0001
    max_grad_norm: 0.5
    device: cpu
    early_stop: true
    early_stop_min_steps: 0
    early_stop_reward_threshold: 1.0
    early_stop_failure_rate_threshold: 0.0
    early_stop_deterministic_total_reward_threshold: 1.0
    early_stop_deterministic_eval_episodes: 1
  training_wrappers:
    coordinate_observation: true
    dense_reward_shaping: true
  activation: relu

